site_name: CoGrid
site_url: https://cogrid.readthedocs.io
repo_url: https://github.com/chasemcd/cogrid
repo_name: chasemcd/cogrid

theme:
  name: readthedocs
  logo: assets/images/cogrid_logo_clean.png

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  # - gen-files:
  #     scripts:
  #       - scripts/gen_ref_pages.py
  # - literate-nav:
  #     nav_file: SUMMARY.md
  # - section-index
  # - mkdocstrings:
  #     handlers:
  #       python:
  #         paths: [.]
  #         options:
  #           docstring_style: google
  #           docstring_section_style: table
  #           show_source: true
  #           show_root_heading: true
  #           show_symbol_type_heading: true
  #           show_symbol_type_toc: true
  #           members_order: source

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

nav:
  - Getting Started: index.md
  - Concepts:
    - Grid & Layouts: concepts/layouts.md
    - Objects: concepts/objects.md
    - Interactions: concepts/interactions.md
    - Actions: concepts/actions.md
    - Observations: concepts/observations.md
    - Rewards: concepts/rewards.md
  - Environments:
    - Overcooked: environments/overcooked.md
    - Goal Seeking: environments/goal-seeking.md
  - Custom Environment: custom-environment.md
  - Advanced Patterns: advanced-patterns.md
  - JAX Reference: jax-reference.md
  - API Reference: api-reference.md
