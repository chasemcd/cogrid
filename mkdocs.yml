site_name: CoGrid
site_url: https://cogrid.readthedocs.io
repo_url: https://github.com/chasemcd/cogrid
repo_name: chasemcd/cogrid

theme:
  name: material
  logo: assets/images/cogrid_logo_clean.png
  favicon: assets/images/cogrid_logo_clean.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.follow

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            docstring_section_style: list
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            show_bases: false
            heading_level: 3
            line_length: 60

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

nav:
  - Getting Started: index.md
  - Concepts:
    - Grid & Layouts: concepts/layouts.md
    - Objects: concepts/objects.md
    - Interactions: concepts/interactions.md
    - Actions: concepts/actions.md
    - Observations: concepts/observations.md
    - Rewards: concepts/rewards.md
  - Environments:
    - Overcooked: environments/overcooked.md    
    - Overcooked V2: environments/overcooked_v2.md

    - Goal Seeking: environments/goal-seeking.md
  - Guides:
    - Custom Environment: custom-environment.md
    - Advanced Patterns: advanced-patterns.md
  - Reference:
    - JAX: jax-reference.md
